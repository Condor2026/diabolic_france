# ============================================
# DIABOLIC FRANCE - Docker Compose
# Plateforme de renseignement criminel française
# ============================================

version: '3.8'

services:
  diabolic-france:
    build: .
    container_name: diabolic_france
    restart: unless-stopped
    ports:
      - "5016:5016"
    volumes:
      - diabolic_france-data:/app/data
      - diabolic_france-exports:/app/exports
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=5016
      - LANG=fr_FR.UTF-8
      - LC_ALL=fr_FR.UTF-8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5016"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - diabolic-network

  # Opcional: servicio de backup automático
  diabolic-backup:
    image: alpine:latest
    container_name: diabolic_backup
    volumes:
      - diabolic_france-data:/data:ro
      - ./backups:/backups
    command: |
      sh -c "
      while true; do
        tar -czf /backups/diabolic_france-backup-$(date +%Y%m%d-%H%M%S).tar.gz /data/ 2>/dev/null || true
        find /backups -name '*.tar.gz' -mtime +7 -delete
        sleep 86400
      done
      "
    restart: unless-stopped
    networks:
      - diabolic-network

volumes:
  diabolic_france-data:
    driver: local
  diabolic_france-exports:
    driver: local

networks:
  diabolic-network:
    driver: bridge
```

